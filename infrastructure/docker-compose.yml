services:
  v7-core-db:
    image: postgres:16.6-alpine
    container_name: v7-core-db
    ports:
      - "${INTERNAL_SERVER_IP:-127.0.0.1}:5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-directus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-directus}
      POSTGRES_DB: ${DB_NAME:-directus}
    volumes:
      - v7_core_postgres_data:/var/lib/postgresql/data
    networks:
      - shared-network

  v7-core-redis:
    image: redis:7.4-alpine
    container_name: v7-core-redis
    ports:
      - "${INTERNAL_SERVER_IP:-127.0.0.1}:6379:6379"
    volumes:
      - v7_core_redis_data:/data
    networks:
      - shared-network

  v7-core-directus:
    image: directus/directus:11.1.1
    container_name: v7-core-directus
    command: >
      sh -c "npx directus bootstrap && npx directus start"
    ports:
      - "8055:8055"
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: 'pg'
      DB_HOST: v7-core-db
      DB_PORT: '5432'
      DB_DATABASE: ${DB_NAME:-directus}
      DB_USER: ${DB_USER:-directus}
      DB_PASSWORD: ${DB_PASSWORD:-directus}
      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      CACHE_REDIS: "redis://v7-core-redis:6379"
      REDIS: "redis://v7-core-redis:6379"
      PM2_HOME: "/tmp/pm2"
      ADMIN_EXTERNAL_URL: https://admin.salvemundi.nl
    volumes:
      - v7_core_directus_uploads:/directus/uploads
    networks:
      - shared-network
      - proxy-network

networks:
  shared-network:
    name: salve-mundi-v7-shared
    external: true
  proxy-network:
    external: true

volumes:
  v7_core_postgres_data:
  v7_core_redis_data:
  v7_core_directus_uploads:
