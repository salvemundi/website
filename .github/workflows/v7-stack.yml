name: Deploy V7 Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - acceptance
  pull_request:
    branches:
      - main
      - acceptance

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Hulpservice om de juiste Docker tag te bepalen (branchnaam)
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - run: echo "Determining tag for branch ${{ github.ref_name }}"

  lint:
    needs: prepare
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@salvemundi/validations build
      - run: pnpm type-check
      - run: pnpm -r lint

  build-frontend:
    needs: [prepare, lint]
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ghcr.io/salvemundi/v7-app:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=${{ github.workflow }}-frontend
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-frontend

  build-services:
    needs: [prepare, lint]
    name: Build Microservices
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [finance, azure-sync, mail, azure-management]
        include:
          - service: finance
            file: apps/services/finance-service/Dockerfile
            image: v7-finance
          - service: azure-sync
            file: apps/services/azure-sync-service/Dockerfile
            image: v7-sync
          - service: mail
            file: apps/services/mail-service/Dockerfile
            image: v7-mail
          - service: azure-management
            file: apps/services/azure-management-service/Dockerfile
            image: v7-management
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/salvemundi/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.service }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [prepare, build-frontend, build-services]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.ref_name == 'main' && 'Production' || 'Acceptance' }}
    steps:
      - uses: actions/checkout@v4

      - name: Connect to NetBird VPN
        uses: Alemiz112/netbird-connect@v1
        with:
          setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          management-url: https://vpn.salvemundi.nl

      - name: Wait for VPN routing to be ready
        run: |
          echo "Waiting for SSH port on 100.77.182.130 to be reachable..."
          for i in {1..30}; do
            if timeout 1 bash -c 'cat < /dev/null > /dev/tcp/100.77.182.130/22' >/dev/null 2>&1; then
              echo "VPS SSH port is reachable!"
              exit 0
            fi
            echo "VPS SSH port not reachable yet, waiting 2 seconds... ($i/30)"
            sleep 2
          done
          echo "Error: VPS SSH port remained unreachable after 60 seconds."
          exit 1

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Upload Docker Compose
        run: |
          scp -i ~/.ssh/deploy_key docker-compose.yml ${{ secrets.SSH_USER }}@100.77.182.130:/opt/salve-mundi-v7/docker-compose.yml

      - name: Execute Deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@100.77.182.130 bash << 'ENDSSH'
          set -e
          cd /opt/salve-mundi-v7

          # 1. Login to Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # 2. Omgevingsdetectie
          ENV_NAME="acc"
          FRONTEND_PORT="3000"
          FINANCE_PORT="13001"
          SYNC_PORT="13002"
          MAIL_PORT="13003"
          MANAGEMENT_PORT="13004"
          if [ "${{ needs.prepare.outputs.tag }}" = "main" ]; then
            ENV_NAME="prod"
            FRONTEND_PORT="4000"
            FINANCE_PORT="3001"
            SYNC_PORT="3002"
            MAIL_PORT="3003"
            MANAGEMENT_PORT="3004"
          fi

          # 3. Maak .env.${ENV_NAME} leeg
          echo "# Auto-generated V7 App Environment" > .env.${ENV_NAME}

          # 4. Schrijf alle secrets naar het .env bestand
          cat >> .env.${ENV_NAME} << 'EOF'
          MOLLIE_API_KEY="${{ secrets.MOLLIE_API_KEY }}"
          MOLLIE_WEBHOOK_SECRET="${{ secrets.MOLLIE_WEBHOOK_SECRET }}"
          DB_USER="${{ secrets.DB_USER }}"
          DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          DB_NAME="${{ secrets.DB_NAME }}"
          DIRECTUS_KEY="${{ secrets.DIRECTUS_KEY }}"
          DIRECTUS_SECRET="${{ secrets.DIRECTUS_SECRET }}"
          INTERNAL_SERVICE_TOKEN="${{ secrets.INTERNAL_SERVICE_TOKEN }}"
          AZURE_WEBSITEV7_TENANT_ID="${{ secrets.AZURE_WEBSITEV7_TENANT_ID }}"
          AZURE_WEBSITEV7_SYNC_CLIENT_ID="${{ secrets.AZURE_WEBSITEV7_SYNC_CLIENT_ID }}"
          AZURE_WEBSITEV7_SYNC_CLIENT_SECRET="${{ secrets.AZURE_WEBSITEV7_SYNC_CLIENT_SECRET }}"
          AZURE_WEBSITEV7_MAIL_CLIENT_ID="${{ secrets.AZURE_WEBSITEV7_MAIL_CLIENT_ID }}"
          AZURE_WEBSITEV7_MAIL_CLIENT_SECRET="${{ secrets.AZURE_WEBSITEV7_MAIL_CLIENT_SECRET }}"
          AZURE_MAIL_SENDER="${{ secrets.AZURE_MAIL_SENDER }}"
          AZURE_WEBSITEV7_AUTH_CLIENT_ID="${{ secrets.AZURE_WEBSITEV7_AUTH_CLIENT_ID }}"
          AZURE_WEBSITEV7_AUTH_CLIENT_SECRET="${{ secrets.AZURE_WEBSITEV7_AUTH_CLIENT_SECRET }}"
          AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID="${{ secrets.AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID }}"
          AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET="${{ secrets.AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET }}"
          BETTER_AUTH_SECRET="${{ secrets.BETTER_AUTH_SECRET }}"
          DIRECTUS_STATIC_TOKEN="${{ secrets.DIRECTUS_STATIC_TOKEN }}"
          REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}"
          AZURE_WEBSITEV7_PROVISIONING_CLIENT_ID="${{ secrets.AZURE_WEBSITEV7_PROVISIONING_CLIENT_ID }}"
          AZURE_WEBSITEV7_PROVISIONING_CLIENT_SECRET="${{ secrets.AZURE_WEBSITEV7_PROVISIONING_CLIENT_SECRET }}"
          VPN_IP="${{ secrets.VPS_IP }}"
          EOF

          # 5. Voeg de afgeleide en overige variabelen toe
          echo "IMAGE_TAG=${{ needs.prepare.outputs.tag }}" >> .env.${ENV_NAME}
          echo "PUBLIC_URL=${{ vars.PUBLIC_URL }}" >> .env.${ENV_NAME}
          echo "BETTER_AUTH_URL=${{ vars.BETTER_AUTH_URL }}" >> .env.${ENV_NAME}
          echo "FRONTEND_PORT=${FRONTEND_PORT}" >> .env.${ENV_NAME}
          echo "FINANCE_PORT=${FINANCE_PORT}" >> .env.${ENV_NAME}
          echo "SYNC_PORT=${SYNC_PORT}" >> .env.${ENV_NAME}
          echo "MAIL_PORT=${MAIL_PORT}" >> .env.${ENV_NAME}
          echo "MANAGEMENT_PORT=${MANAGEMENT_PORT}" >> .env.${ENV_NAME}
          echo "COMPOSE_PROJECT_NAME=v7-${ENV_NAME}" >> .env.${ENV_NAME}
          echo "TRUST_PROXY=true" >> .env.${ENV_NAME}
          echo "INTERNAL_DIRECTUS_URL=http://v7-core-directus:8055" >> .env.${ENV_NAME}
          echo "AZURE_SYNC_SERVICE_URL=http://v7-${ENV_NAME}-sync:3002" >> .env.${ENV_NAME}
          echo "AZURE_MANAGEMENT_SERVICE_URL=http://v7-${ENV_NAME}-management:3004" >> .env.${ENV_NAME}
          echo "MAIL_SERVICE_URL=http://v7-${ENV_NAME}-mail:3003" >> .env.${ENV_NAME}
          echo "NEXT_APP_INTERNAL_URL=http://v7-${ENV_NAME}-app:3000" >> .env.${ENV_NAME}
          echo "DB_HOST=v7-core-db" >> .env.${ENV_NAME}

          if [ ! -z "${{ secrets.REDIS_PASSWORD }}" ]; then
            echo "REDIS_URL=redis://default:${{ secrets.REDIS_PASSWORD }}@v7-core-redis:6379" >> .env.${ENV_NAME}
          else
            echo "REDIS_URL=redis://v7-core-redis:6379" >> .env.${ENV_NAME}
          fi

          # 6. Pull en restart
          docker compose --env-file .env.${ENV_NAME} pull
          docker compose --env-file .env.${ENV_NAME} up -d --remove-orphans
          docker image prune -af
          ENDSSH
