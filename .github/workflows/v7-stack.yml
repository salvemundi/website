name: Deploy V7 Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - acceptance
  pull_request:
    branches:
      - main
      - acceptance

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Hulpservice om de juiste Docker tag te bepalen (branchnaam)
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - run: echo "Determining tag for branch ${{ github.ref_name }}"

  lint:
    needs: prepare
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@salvemundi/validations build
      - run: pnpm -r lint

  build-frontend:
    needs: [prepare, lint]
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ghcr.io/salvemundi/v7-app:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=${{ github.workflow }}-frontend
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-frontend

  build-services:
    needs: [prepare, lint]
    name: Build Microservices
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [finance, azure-sync, mail, azure-management]
        include:
          - service: finance
            file: apps/services/finance-service/Dockerfile
            image: v7-finance
          - service: azure-sync
            file: apps/services/azure-sync-service/Dockerfile
            image: v7-sync
          - service: mail
            file: apps/services/mail-service/Dockerfile
            image: v7-mail
          - service: azure-management
            file: apps/services/azure-management-service/Dockerfile
            image: v7-management
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/salvemundi/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ matrix.service }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [prepare, build-frontend, build-services]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.ref_name == 'main' && 'Production' || 'Acceptance' }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload Docker Compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/salve-mundi-v7"

      - name: Execute Deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Alle secrets mappen naar env
          MOLLIE_API_KEY: ${{ secrets.MOLLIE_API_KEY }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DIRECTUS_KEY: ${{ secrets.DIRECTUS_KEY }}
          DIRECTUS_SECRET: ${{ secrets.DIRECTUS_SECRET }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          AZURE_WEBSITEV7_TENANT_ID: ${{ secrets.AZURE_WEBSITEV7_TENANT_ID }}
          AZURE_WEBSITEV7_SYNC_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_SYNC_CLIENT_ID }}
          AZURE_WEBSITEV7_SYNC_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_SYNC_CLIENT_SECRET }}
          AZURE_WEBSITEV7_MAIL_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_MAIL_CLIENT_ID }}
          AZURE_WEBSITEV7_MAIL_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_MAIL_CLIENT_SECRET }}
          AZURE_MAIL_SENDER: ${{ secrets.AZURE_MAIL_SENDER }}
          AZURE_WEBSITEV7_AUTH_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_AUTH_CLIENT_ID }}
          AZURE_WEBSITEV7_AUTH_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_AUTH_CLIENT_SECRET }}
          AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID }}
          AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DIRECTUS_STATIC_TOKEN: ${{ secrets.DIRECTUS_STATIC_TOKEN }}
          # Variabelen
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: MOLLIE_API_KEY,DB_USER,DB_PASSWORD,DB_NAME,DIRECTUS_KEY,DIRECTUS_SECRET,INTERNAL_SERVICE_TOKEN,AZURE_WEBSITEV7_TENANT_ID,AZURE_WEBSITEV7_SYNC_CLIENT_ID,AZURE_WEBSITEV7_SYNC_CLIENT_SECRET,AZURE_WEBSITEV7_MAIL_CLIENT_ID,AZURE_WEBSITEV7_MAIL_CLIENT_SECRET,AZURE_MAIL_SENDER,AZURE_WEBSITEV7_AUTH_CLIENT_ID,AZURE_WEBSITEV7_AUTH_CLIENT_SECRET,AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID,AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET,BETTER_AUTH_SECRET,DIRECTUS_STATIC_TOKEN,IMAGE_TAG,PUBLIC_URL,BETTER_AUTH_URL
          script: |
            cd /opt/salve-mundi-v7
            
            # Omgevingsdetectie
            ENV_NAME="acc"
            FRONTEND_PORT="3000"
            if [ "${{ needs.prepare.outputs.tag }}" = "main" ]; then 
              ENV_NAME="prod"
              FRONTEND_PORT="4000"
            fi

            # Expliciete .env generatie (hufterproof)
            echo "# Auto-generated V7 App Environment" > .env
            
            echo "IMAGE_TAG=${{ needs.prepare.outputs.tag }}" >> .env
            echo "PUBLIC_URL=${PUBLIC_URL}" >> .env
            echo "BETTER_AUTH_URL=${BETTER_AUTH_URL}" >> .env
            echo "FRONTEND_PORT=${FRONTEND_PORT}" >> .env
            echo "COMPOSE_PROJECT_NAME=v7-${ENV_NAME}" >> .env
            echo "TRUST_PROXY=true" >> .env
            echo "REDIS_URL=redis://v7-core-redis:6379" >> .env
            echo "INTERNAL_DIRECTUS_URL=http://v7-core-directus:8055" >> .env

            # Veilig afdrukken van ruwe secrets uit de active shell environment (met newline stripping per variabele)
            VARIABLES="MOLLIE_API_KEY DB_USER DB_PASSWORD DB_NAME DIRECTUS_KEY DIRECTUS_SECRET INTERNAL_SERVICE_TOKEN AZURE_WEBSITEV7_TENANT_ID AZURE_WEBSITEV7_SYNC_CLIENT_ID AZURE_WEBSITEV7_SYNC_CLIENT_SECRET AZURE_WEBSITEV7_MAIL_CLIENT_ID AZURE_WEBSITEV7_MAIL_CLIENT_SECRET AZURE_MAIL_SENDER AZURE_WEBSITEV7_AUTH_CLIENT_ID AZURE_WEBSITEV7_AUTH_CLIENT_SECRET AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET BETTER_AUTH_SECRET DIRECTUS_STATIC_TOKEN"
            for var in $VARIABLES; do
              val=$(eval echo \$$var)
              if [ ! -z "$val" ]; then
                # Strip eventuele extra newlines/carriage returns
                clean_val=$(echo "$val" | tr -d '\n\r')
                echo "$var=$clean_val" >> .env
              fi
            done

            # Login en start
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af