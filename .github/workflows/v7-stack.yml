name: Deploy V7 Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - acceptance
  pull_request:
    branches:
      - main
      - acceptance

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/salvemundi/v7-app:${{ github.sha }}
            ghcr.io/salvemundi/v7-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-finance:
    name: Build Finance Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Finance Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/services/finance-service/Dockerfile
          push: true
          tags: |
            ghcr.io/salvemundi/v7-finance:${{ github.sha }}
            ghcr.io/salvemundi/v7-finance:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-sync:
    name: Build Sync Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Sync Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/services/azure-sync-service/Dockerfile
          push: true
          tags: |
            ghcr.io/salvemundi/v7-sync:${{ github.sha }}
            ghcr.io/salvemundi/v7-sync:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mail:
    name: Build Mail Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Mail Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/services/mail-service/Dockerfile
          push: true
          tags: |
            ghcr.io/salvemundi/v7-mail:${{ github.sha }}
            ghcr.io/salvemundi/v7-mail:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-frontend, build-finance, build-sync, build-mail]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: Acceptance
      url: ${{ vars.PUBLIC_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Network & SSH Diagnostics
        run: |
          echo "--- Starting Network Diagnostics ---"
          echo "Checking if host is reachable on port 22..."
          nc -zv -w 5 ${{ secrets.SSH_HOST }} 22 || echo "WARNING: Port 22 is NOT reachable. Is the SSH port different?"
          
          echo "--- Starting SSH Verbose Handshake Test ---"
          # Create temporary key file
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Try to connect with max verbosity (-vvv) to see the exact rejection reason
          # We use -o StrictHostKeyChecking=no to avoid manual intervention
          ssh -vvv -i ~/.ssh/deploy_key -p 22 -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo 'Handshake successful'" || true
          
          # Clean up
          rm ~/.ssh/deploy_key
          echo "--- Diagnostics Complete ---"

      - name: Create Target Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: mkdir -p /opt/salve-mundi-v7

      - name: Upload Docker Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/salve-mundi-v7"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true
          timeout: 60s
          command_timeout: 10m
          script_stop: true
          script: |
            echo "--- Starting V7 Deployment on VPS ---"
            mkdir -p /opt/salve-mundi-v7
            cd /opt/salve-mundi-v7
            echo "Working Directory: $(pwd)"
            
            echo "Checking Docker environment..."
            docker version || { echo "Docker not found or no permissions!"; exit 1; }
            docker compose version || { echo "Docker Compose not found!"; exit 1; }

            echo "Logging into GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Simplified Environment Check
            ENV_SUFFIX="acc"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then ENV_SUFFIX="prod"; fi
            echo "Target Environment: $ENV_SUFFIX"
            
            # Application Context
            export FINANCE_DNS="finance-$ENV_SUFFIX"
            export SYNC_DNS="sync-$ENV_SUFFIX"
            export MAIL_DNS="mail-$ENV_SUFFIX"
            export FRONTEND_DNS="frontend-$ENV_SUFFIX"
            
            export INTERNAL_FINANCE_URL="http://$FINANCE_DNS:3001"
            export INTERNAL_SYNC_URL="http://$SYNC_DNS:3002"
            export INTERNAL_MAIL_URL="http://$MAIL_DNS:3003"
            export INTERNAL_DIRECTUS_URL="http://directus:8055"
            
            export IMAGE_TAG=${{ github.sha }}
            export PUBLIC_URL=${{ vars.PUBLIC_URL }}
            
            # Secrets (Wrapped in quotes to prevent injection/newline issues)
            export MOLLIE_API_KEY="${{ secrets.MOLLIE_API_KEY }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export DIRECTUS_KEY="${{ secrets.DIRECTUS_KEY }}"
            export DIRECTUS_SECRET="${{ secrets.DIRECTUS_SECRET }}"
            export INTERNAL_SERVICE_TOKEN="${{ secrets.INTERNAL_SERVICE_TOKEN }}"
            export AZURE_WEBSITEV7_TENANT_ID="${{ secrets.AZURE_WEBSITEV7_TENANT_ID }}"
            export AZURE_WEBSITEV7_SYNC_CLIENT_ID="${{ secrets.AZURE_WEBSITEV7_SYNC_CLIENT_ID }}"
            export AZURE_WEBSITEV7_SYNC_CLIENT_SECRET="${{ secrets.AZURE_WEBSITEV7_SYNC_CLIENT_SECRET }}"
            export AZURE_WEBSITEV7_MAIL_CLIENT_ID="${{ secrets.AZURE_WEBSITEV7_MAIL_CLIENT_ID }}"
            export AZURE_WEBSITEV7_MAIL_CLIENT_SECRET="${{ secrets.AZURE_WEBSITEV7_MAIL_CLIENT_SECRET }}"
            
            echo "Pulling images..."
            docker compose pull
            
            echo "Starting services..."
            docker compose up -d
            
            echo "Cleanup..."
            docker image prune -f
            
            echo "--- Deployment Successful ---"

