name: Deploy V7 Stack

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - acceptance
  pull_request:
    branches:
      - main
      - acceptance

permissions:
  contents: read
  packages: write

jobs:
  # Hulpservice om de juiste Docker tag te bepalen (branchnaam)
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - run: echo "Determining tag for branch ${{ github.ref_name }}"

  build-frontend:
    needs: prepare
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ghcr.io/salvemundi/v7-app:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-services:
    needs: prepare
    name: Build Microservices
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [finance, azure-sync, mail, azure-management]
        include:
          - service: finance
            file: apps/services/finance-service/Dockerfile
            image: v7-finance
          - service: azure-sync
            file: apps/services/azure-sync-service/Dockerfile
            image: v7-sync
          - service: mail
            file: apps/services/mail-service/Dockerfile
            image: v7-mail
          - service: azure-management
            file: apps/services/azure-management-service/Dockerfile
            image: v7-management
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/salvemundi/${{ matrix.image }}:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [prepare, build-frontend, build-services]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.ref_name == 'main' && 'Production' || 'Acceptance' }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload Docker Compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/salve-mundi-v7"

      - name: Execute Deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Alle secrets mappen naar env
          MOLLIE_API_KEY: ${{ secrets.MOLLIE_API_KEY }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DIRECTUS_KEY: ${{ secrets.DIRECTUS_KEY }}
          DIRECTUS_SECRET: ${{ secrets.DIRECTUS_SECRET }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          AZURE_WEBSITEV7_TENANT_ID: ${{ secrets.AZURE_WEBSITEV7_TENANT_ID }}
          AZURE_WEBSITEV7_SYNC_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_SYNC_CLIENT_ID }}
          AZURE_WEBSITEV7_SYNC_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_SYNC_CLIENT_SECRET }}
          AZURE_WEBSITEV7_MAIL_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_MAIL_CLIENT_ID }}
          AZURE_WEBSITEV7_MAIL_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_MAIL_CLIENT_SECRET }}
          AZURE_MAIL_SENDER: ${{ secrets.AZURE_MAIL_SENDER }}
          AZURE_WEBSITEV7_AUTH_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_AUTH_CLIENT_ID }}
          AZURE_WEBSITEV7_AUTH_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_AUTH_CLIENT_SECRET }}
          AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID }}
          AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DIRECTUS_STATIC_TOKEN: ${{ secrets.DIRECTUS_STATIC_TOKEN }}
          # Variabelen
          IMAGE_TAG: ${{ needs.prepare.outputs.tag }}
          PUBLIC_URL: ${{ vars.PUBLIC_URL }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: MOLLIE_API_KEY,DB_USER,DB_PASSWORD,DB_NAME,DIRECTUS_KEY,DIRECTUS_SECRET,INTERNAL_SERVICE_TOKEN,AZURE_WEBSITEV7_TENANT_ID,AZURE_WEBSITEV7_SYNC_CLIENT_ID,AZURE_WEBSITEV7_SYNC_CLIENT_SECRET,AZURE_WEBSITEV7_MAIL_CLIENT_ID,AZURE_WEBSITEV7_MAIL_CLIENT_SECRET,AZURE_MAIL_SENDER,AZURE_WEBSITEV7_AUTH_CLIENT_ID,AZURE_WEBSITEV7_AUTH_CLIENT_SECRET,AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID,AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET,BETTER_AUTH_SECRET,DIRECTUS_STATIC_TOKEN,IMAGE_TAG,PUBLIC_URL,BETTER_AUTH_URL
          script: |
            cd /opt/salve-mundi-v7
            
            # Omgevingsdetectie
            ENV_NAME="acc"
            FRONTEND_PORT="3000"
            if [ "${{ needs.prepare.outputs.tag }}" = "main" ]; then 
              ENV_NAME="prod"
              FRONTEND_PORT="4000"
            fi

            # Expliciete .env generatie (hufterproof)
            echo "# Auto-generated V7 App Environment" > .env
            printf "MOLLIE_API_KEY=\"%s\"\n" "$(echo "$MOLLIE_API_KEY" | tr -d '\n\r')" >> .env
            printf "DB_USER=\"%s\"\n" "$(echo "$DB_USER" | tr -d '\n\r')" >> .env
            printf "DB_PASSWORD=\"%s\"\n" "$(echo "$DB_PASSWORD" | tr -d '\n\r')" >> .env
            printf "DB_NAME=\"%s\"\n" "$(echo "$DB_NAME" | tr -d '\n\r')" >> .env
            printf "DIRECTUS_KEY=\"%s\"\n" "$(echo "$DIRECTUS_KEY" | tr -d '\n\r')" >> .env
            printf "DIRECTUS_SECRET=\"%s\"\n" "$(echo "$DIRECTUS_SECRET" | tr -d '\n\r')" >> .env
            printf "INTERNAL_SERVICE_TOKEN=\"%s\"\n" "$(echo "$INTERNAL_SERVICE_TOKEN" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_TENANT_ID=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_TENANT_ID" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_SYNC_CLIENT_ID=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_SYNC_CLIENT_ID" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_SYNC_CLIENT_SECRET=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_SYNC_CLIENT_SECRET" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_MAIL_CLIENT_ID=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_MAIL_CLIENT_ID" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_MAIL_CLIENT_SECRET=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_MAIL_CLIENT_SECRET" | tr -d '\n\r')" >> .env
            printf "AZURE_MAIL_SENDER=\"%s\"\n" "$(echo "$AZURE_MAIL_SENDER" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_AUTH_CLIENT_ID=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_AUTH_CLIENT_ID" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_AUTH_CLIENT_SECRET=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_AUTH_CLIENT_SECRET" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET" | tr -d '\n\r')" >> .env
            printf "BETTER_AUTH_SECRET=\"%s\"\n" "$(echo "$BETTER_AUTH_SECRET" | tr -d '\n\r')" >> .env
            printf "DIRECTUS_STATIC_TOKEN=\"%s\"\n" "$(echo "$DIRECTUS_STATIC_TOKEN" | tr -d '\n\r')" >> .env
            printf "BETTER_AUTH_URL=\"%s\"\n" "$BETTER_AUTH_URL" >> .env
            printf "PUBLIC_URL=\"%s\"\n" "$PUBLIC_URL" >> .env
            printf "IMAGE_TAG=\"%s\"\n" "${{ needs.prepare.outputs.tag }}" >> .env
            printf "FRONTEND_PORT=\"%s\"\n" "$FRONTEND_PORT" >> .env
            printf "COMPOSE_PROJECT_NAME=\"v7-$ENV_NAME\"\n" >> .env
            printf "TRUST_PROXY=\"true\"\n" >> .env
            printf "REDIS_URL=\"redis://v7-core-redis:6379\"\n" >> .env
            printf "INTERNAL_DIRECTUS_URL=\"http://v7-core-directus:8055\"\n" >> .env

            # Login en start
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -af