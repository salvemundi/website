name: Deploy V7 Core Infrastructure

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - acceptance
    paths:
      - 'infrastructure/**'
      - '.github/workflows/v7-core.yml'

permissions:
  contents: read

jobs:
  deploy-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Bepaal de juiste URL op basis van de branch
      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "DOMAIN=admin.salvemundi.nl" >> $GITHUB_ENV
          else
            echo "DOMAIN=acc.salvemundi.nl" >> $GITHUB_ENV
          fi

      - name: Copy Infrastructure files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "infrastructure/docker-compose.yml,infrastructure/databases.json"
          target: "/opt/salve-mundi-v7/infra"
          strip_components: 1

      - name: Deploy Core Stack via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          INTERNAL_SERVER_IP: ${{ secrets.INTERNAL_SERVER_IP }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DIRECTUS_KEY: ${{ secrets.DIRECTUS_KEY }}
          DIRECTUS_SECRET: ${{ secrets.DIRECTUS_SECRET }}
          AZURE_WEBSITEV7_TENANT_ID: ${{ secrets.AZURE_WEBSITEV7_TENANT_ID }}
          AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID: ${{ secrets.AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID }}
          AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET: ${{ secrets.AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET }}
          DIRECTUS_ALLOWED_REDIRECTS: ${{ secrets.DIRECTUS_ALLOWED_REDIRECTS }}
          DIRECTUS_STATIC_TOKEN: ${{ secrets.DIRECTUS_STATIC_TOKEN }}
          DOMAIN_URL: "https://${{ env.DOMAIN }}"
          INTERNAL_DIRECTUS_URL: "http://v7-core-directus:8055"
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: INTERNAL_SERVER_IP,DB_USER,DB_PASSWORD,DB_NAME,DIRECTUS_KEY,DIRECTUS_SECRET,AZURE_WEBSITEV7_TENANT_ID,AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID,AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET,DIRECTUS_ALLOWED_REDIRECTS,DOMAIN_URL,DIRECTUS_STATIC_TOKEN,INTERNAL_DIRECTUS_URL
          script_stop: true
          script: |
            cd /opt/salve-mundi-v7/infra
            
            # 2. Expliciete .env generatie (POSIX compliant, werkt altijd)
            echo "# Auto-generated V7 Core Environment" > .env
            
            printf "INTERNAL_SERVER_IP=\"%s\"\n" "$(echo "$INTERNAL_SERVER_IP" | tr -d '\n\r')" >> .env
            printf "DB_USER=\"%s\"\n" "$(echo "$DB_USER" | tr -d '\n\r')" >> .env
            printf "DB_PASSWORD=\"%s\"\n" "$(echo "$DB_PASSWORD" | tr -d '\n\r')" >> .env
            printf "DB_NAME=\"%s\"\n" "$(echo "$DB_NAME" | tr -d '\n\r')" >> .env
            printf "DIRECTUS_KEY=\"%s\"\n" "$(echo "$DIRECTUS_KEY" | tr -d '\n\r')" >> .env
            printf "DIRECTUS_SECRET=\"%s\"\n" "$(echo "$DIRECTUS_SECRET" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_TENANT_ID=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_TENANT_ID" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID" | tr -d '\n\r')" >> .env
            printf "AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET=\"%s\"\n" "$(echo "$AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET" | tr -d '\n\r')" >> .env
            printf "DIRECTUS_ALLOWED_REDIRECTS=\"%s\"\n" "$(echo "$DIRECTUS_ALLOWED_REDIRECTS" | tr -d '\n\r')" >> .env
            printf "DIRECTUS_STATIC_TOKEN=\"%s\"\n" "$(echo "$DIRECTUS_STATIC_TOKEN" | tr -d '\n\r')" >> .env
            
            # Handmatige URL's
            printf "PUBLIC_URL=\"%s\"\n" "$DOMAIN_URL" >> .env
            printf "CORS_ORIGIN=\"%s\"\n" "$DOMAIN_URL" >> .env
            printf "INTERNAL_DIRECTUS_URL=\"%s\"\n" "$INTERNAL_DIRECTUS_URL" >> .env

            # 3. Start de infra
            docker network create salve-mundi-v7-shared || true
            docker compose -p v7-core up -d --remove-orphans

            echo "--- Core Infrastructure Deployed to ${{ env.DOMAIN }} ---"