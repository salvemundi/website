name: "CI/CD: Build & Deploy V7 Stack"

on:
  workflow_dispatch:
  push:
    branches: [main, acceptance]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Acceptance' }}
      url: ${{ vars.PUBLIC_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ghcr.io/salvemundi/v7-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/salve-mundi-v7
            export PUBLIC_URL=${{ vars.PUBLIC_URL }}
            export MOLLIE_API_KEY=${{ secrets.MOLLIE_API_KEY }}
            docker compose pull
            docker compose up -d
