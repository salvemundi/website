services:
  frontend:
    container_name: ${COMPOSE_PROJECT_NAME}-app
    image: ghcr.io/salvemundi/v7-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/favicon.ico"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    env_file:
      - .env.${ENV_NAME}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      - PUBLIC_URL=${PUBLIC_URL}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS:-$BETTER_AUTH_URL}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - FINANCE_SERVICE_URL=${FINANCE_SERVICE_URL}
      - AZURE_SYNC_SERVICE_URL=${AZURE_SYNC_SERVICE_URL}
      - AZURE_MANAGEMENT_SERVICE_URL=${AZURE_MANAGEMENT_SERVICE_URL}
      - MAIL_SERVICE_URL=${MAIL_SERVICE_URL}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - MOLLIE_WEBHOOK_SECRET=${MOLLIE_WEBHOOK_SECRET}
      - AZURE_WEBSITEV7_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_WEBSITEV7_AUTH_CLIENT_ID=${AZURE_WEBSITEV7_AUTH_CLIENT_ID}
      - AZURE_WEBSITEV7_AUTH_CLIENT_SECRET=${AZURE_WEBSITEV7_AUTH_CLIENT_SECRET}
      - AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID=${AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=v7-core-db
      - DB_PORT=${DB_PORT}
      - REDIS_URL=${REDIS_URL}
      - NEXT_APP_INTERNAL_URL=http://localhost:3000
      - TRUST_PROXY=true
      - HOSTNAME=0.0.0.0
      - TZ=Europe/Amsterdam
    volumes:
      - v7_next_cache:/app/apps/frontend/.next/cache
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - salve-mundi-v7-shared
      - proxy-network

  finance-service:
    container_name: ${COMPOSE_PROJECT_NAME}-finance
    image: ghcr.io/salvemundi/v7-finance:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.${ENV_NAME}
    ports:
      - "${VPN_IP}:${FINANCE_PORT:-3001}:3001"
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - MOLLIE_API_KEY=${MOLLIE_API_KEY}
      - DB_URL=postgresql://${DB_USER}:${DB_PASSWORD}@v7-core-db:${DB_PORT}/${DB_NAME}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - REDIS_URL=${REDIS_URL}
      - PUBLIC_URL=${PUBLIC_URL}
      - MOLLIE_WEBHOOK_SECRET=${MOLLIE_WEBHOOK_SECRET}
      - MAIL_SERVICE_URL=${MAIL_SERVICE_URL}
      - AZURE_MANAGEMENT_SERVICE_URL=${AZURE_MANAGEMENT_SERVICE_URL}
      - AZURE_SYNC_SERVICE_URL=${AZURE_SYNC_SERVICE_URL}
      - NEXT_APP_INTERNAL_URL=${NEXT_APP_INTERNAL_URL}
      - TZ=Europe/Amsterdam
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3001/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - salve-mundi-v7-shared

  sync-service:
    container_name: ${COMPOSE_PROJECT_NAME}-sync
    image: ghcr.io/salvemundi/v7-sync:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.${ENV_NAME}
    ports:
      - "${VPN_IP}:${SYNC_PORT:-3002}:3002"
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - AZURE_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_SYNC_CLIENT_ID=${AZURE_WEBSITEV7_SYNC_CLIENT_ID}
      - AZURE_SYNC_CLIENT_SECRET=${AZURE_WEBSITEV7_SYNC_CLIENT_SECRET}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - AZURE_MANAGEMENT_SERVICE_URL=${AZURE_MANAGEMENT_SERVICE_URL}
      - MAIL_SERVICE_URL=${MAIL_SERVICE_URL}
      - REDIS_URL=${REDIS_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=v7-core-db
      - DB_PORT=${DB_PORT}
      - AZURE_ACTIVE_LID_GROUP_ID=${AZURE_ACTIVE_LID_GROUP_ID:-2e17c12a-28d6-49ae-981a-8b5b8d88db8a}
      - AZURE_EXPIRED_LID_GROUP_ID=${AZURE_EXPIRED_LID_GROUP_ID:-98c1d807-613a-4a23-9618-3f8821d35fe9}
      - TZ=Europe/Amsterdam
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3002/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - salve-mundi-v7-shared

  mail-service:
    container_name: ${COMPOSE_PROJECT_NAME}-mail
    image: ghcr.io/salvemundi/v7-mail:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.${ENV_NAME}
    ports:
      - "${VPN_IP}:${MAIL_PORT:-3003}:3003"
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - AZURE_MAIL_CLIENT_ID=${AZURE_WEBSITEV7_MAIL_CLIENT_ID}
      - AZURE_MAIL_CLIENT_SECRET=${AZURE_WEBSITEV7_MAIL_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_MAIL_SENDER=${AZURE_MAIL_SENDER}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - PUBLIC_URL=${PUBLIC_URL}
      - REDIS_URL=${REDIS_URL}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=v7-core-db
      - DB_PORT=${DB_PORT}
      - TZ=Europe/Amsterdam
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3003/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - salve-mundi-v7-shared

  management-service:
    container_name: ${COMPOSE_PROJECT_NAME}-management
    image: ghcr.io/salvemundi/v7-management:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.${ENV_NAME}
    ports:
      - "${VPN_IP}:${MANAGEMENT_PORT:-3004}:3004"
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - AZURE_WEBSITEV7_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_WEBSITEV7_PROVISIONING_CLIENT_ID=${AZURE_WEBSITEV7_PROVISIONING_CLIENT_ID}
      - AZURE_WEBSITEV7_PROVISIONING_CLIENT_SECRET=${AZURE_WEBSITEV7_PROVISIONING_CLIENT_SECRET}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - AZURE_SYNC_SERVICE_URL=${AZURE_SYNC_SERVICE_URL}
      - MAIL_SERVICE_URL=${MAIL_SERVICE_URL}
      - REDIS_URL=${REDIS_URL}
      - AZURE_ACTIVE_LID_GROUP_ID=${AZURE_ACTIVE_LID_GROUP_ID:-2e17c12a-28d6-49ae-981a-8b5b8d88db8a}
      - AZURE_EXPIRED_LID_GROUP_ID=${AZURE_EXPIRED_LID_GROUP_ID:-98c1d807-613a-4a23-9618-3f8821d35fe9}
      - TZ=Europe/Amsterdam
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3004/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - salve-mundi-v7-shared

  monitoring-service:
    container_name: ${COMPOSE_PROJECT_NAME}-monitoring
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    env_file:
      - .env.${ENV_NAME}
    ports:
      - "${MONITORING_PORT:-3006}:3001"

    environment:
      - TZ=Europe/Amsterdam
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "extra/healthcheck.js",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - v7_kuma_data:/app/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - salve-mundi-v7-shared
      - proxy-network


networks:
  salve-mundi-v7-shared:
    external: true
  proxy-network:
    external: true

volumes:
  v7_next_cache:
  v7_kuma_data:

