version: '3.8'

services:
  postgres:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-directus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-directus}
      POSTGRES_DB: ${DB_NAME:-directus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  directus:
    image: directus/directus:11.1.1
    container_name: directus
    ports:
      - "8055:8055"
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: 'pg'
      DB_HOST: 'postgres'
      DB_PORT: '5432'
      DB_DATABASE: ${DB_NAME:-directus}
      DB_USER: ${DB_USER:-directus}
      DB_PASSWORD: ${DB_PASSWORD:-directus}
      CACHE_ENABLED: "true"
      CACHE_STORE: "redis"
      CACHE_REDIS: "redis://redis:6379"
      ADMIN_EXTERNAL_URL: ${PUBLIC_URL:-http://localhost:3000}/admin
    volumes:
      - directus_uploads:/directus/uploads
    depends_on:
      - postgres
      - redis

  finance-service:
    image: ghcr.io/salvemundi/v7-finance:${IMAGE_TAG:-latest}
    container_name: finance-${ENV:-prod}
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - MOLLIE_API_KEY=${MOLLIE_API_KEY}
      - DB_URL=postgresql://${DB_USER:-directus}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-directus}
    depends_on:
      - postgres
      - redis

  sync-service:
    image: ghcr.io/salvemundi/v7-sync:${IMAGE_TAG:-latest}
    container_name: sync-${ENV:-prod}
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - AZURE_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_SYNC_CLIENT_ID=${AZURE_WEBSITEV7_SYNC_CLIENT_ID}
      - AZURE_SYNC_CLIENT_SECRET=${AZURE_WEBSITEV7_SYNC_CLIENT_SECRET}
    depends_on:
      - redis

  mail-service:
    image: ghcr.io/salvemundi/v7-mail:${IMAGE_TAG:-latest}
    container_name: mail-${ENV:-prod}
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - AZURE_MAIL_CLIENT_ID=${AZURE_WEBSITEV7_MAIL_CLIENT_ID}
      - AZURE_MAIL_CLIENT_SECRET=${AZURE_WEBSITEV7_MAIL_CLIENT_SECRET}

  frontend:
    image: ghcr.io/salvemundi/v7-app:${IMAGE_TAG:-latest}
    container_name: frontend-${ENV:-prod}
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_URL=${PUBLIC_URL:-http://localhost:3000}
      - INTERNAL_FINANCE_URL=http://finance-service:3001
      - INTERNAL_SYNC_URL=http://sync-service:3002
      - INTERNAL_MAIL_URL=http://mail-service:3003
      - INTERNAL_DIRECTUS_URL=http://directus:8055
    depends_on:
      - directus
      - finance-service

volumes:
  postgres_data:
  redis_data:
  directus_uploads:
