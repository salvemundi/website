services:
  # 1. De Frontend (Next.js)
  frontend:
    container_name: ${COMPOSE_PROJECT_NAME}-app
    image: ghcr.io/salvemundi/v7-app:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # URLs
      - PUBLIC_URL=${PUBLIC_URL}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_URL}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - FINANCE_SERVICE_URL=http://finance-service:3001
      - AZURE_SYNC_SERVICE_URL=http://sync-service:3002
      - MAIL_SERVICE_URL=http://mail-service:3003
      # Secrets
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      # Azure Auth
      - AZURE_WEBSITEV7_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_WEBSITEV7_AUTH_CLIENT_ID=${AZURE_WEBSITEV7_AUTH_CLIENT_ID}
      - AZURE_WEBSITEV7_AUTH_CLIENT_SECRET=${AZURE_WEBSITEV7_AUTH_CLIENT_SECRET}
      - AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID=${AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID}
      # Database & Infra
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=v7-core-db
      - REDIS_URL=${REDIS_URL}
      - NEXT_APP_INTERNAL_URL=http://localhost:3000
      - TRUST_PROXY=true
      - HOSTNAME=0.0.0.0
    volumes:
      - v7_next_cache:/app/apps/frontend/.next/cache
    networks:
      - salve-mundi-v7-shared
      - proxy-network

  # 2. Finance Service (Mollie)
  finance-service:
    container_name: ${COMPOSE_PROJECT_NAME}-finance
    image: ghcr.io/salvemundi/v7-finance:${IMAGE_TAG:-latest}
    ports:
      - "100.77.182.130:3001:3001"
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - MOLLIE_API_KEY=${MOLLIE_API_KEY}
      - DB_URL=postgresql://${DB_USER}:${DB_PASSWORD}@v7-core-db:5432/${DB_NAME}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - REDIS_URL=${REDIS_URL}
    networks:
      - salve-mundi-v7-shared

  # 3. Sync Service (Azure AD Sync)
  sync-service:
    container_name: ${COMPOSE_PROJECT_NAME}-sync
    image: ghcr.io/salvemundi/v7-sync:${IMAGE_TAG:-latest}
    ports:
      - "100.77.182.130:3002:3002"
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - AZURE_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_SYNC_CLIENT_ID=${AZURE_WEBSITEV7_SYNC_CLIENT_ID}
      - AZURE_SYNC_CLIENT_SECRET=${AZURE_WEBSITEV7_SYNC_CLIENT_SECRET}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - REDIS_URL=${REDIS_URL}
    networks:
      - salve-mundi-v7-shared

  # 4. Mail Service (Microsoft Graph)
  mail-service:
    container_name: ${COMPOSE_PROJECT_NAME}-mail
    image: ghcr.io/salvemundi/v7-mail:${IMAGE_TAG:-latest}
    ports:
      - "100.77.182.130:3003:3003"
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - AZURE_MAIL_CLIENT_ID=${AZURE_WEBSITEV7_MAIL_CLIENT_ID}
      - AZURE_MAIL_CLIENT_SECRET=${AZURE_WEBSITEV7_MAIL_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_MAIL_SENDER=${AZURE_MAIL_SENDER}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
      - REDIS_URL=${REDIS_URL}
    networks:
      - salve-mundi-v7-shared

  # 5. Management Service
  management-service:
    container_name: ${COMPOSE_PROJECT_NAME}-management
    image: ghcr.io/salvemundi/v7-management:${IMAGE_TAG:-latest}
    environment:
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      - AZURE_TENANT_ID=${AZURE_WEBSITEV7_TENANT_ID}
      - AZURE_PROVISIONING_CLIENT_ID=${AZURE_WEBSITEV7_DIRECTUS_CLIENT_ID}
      - AZURE_PROVISIONING_CLIENT_SECRET=${AZURE_WEBSITEV7_DIRECTUS_CLIENT_SECRET}
      - DIRECTUS_STATIC_TOKEN=${DIRECTUS_STATIC_TOKEN}
      - DIRECTUS_SERVICE_URL=${INTERNAL_DIRECTUS_URL}
    networks:
      - salve-mundi-v7-shared

networks:
  salve-mundi-v7-shared:
    external: true
  proxy-network:
    external: true

volumes:
  v7_next_cache: