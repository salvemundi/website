packages:
  - "apps/frontend"
  - "apps/services/*"
  - "packages/*"

allowBuilds:
  "@parcel/watcher": false
  core-js-pure: false
  es5-ext: false
  esbuild: false
  puppeteer: false
  sharp: true
  unrs-resolver: false
  vue-demi: false

overrides:
  sharp: "0.35.3"
  "@img/sharp-win32-x64": "0.35.3"
  "@img/sharp-linuxmusl-x64": "0.35.3"
  "@img/sharp-libvips-linuxmusl-x64": "1.3.2"
  react: "^19.2.7"
  react-dom: "^19.2.7"
  better-auth: "1.6.20"
  "@better-auth/core": "1.6.20"
  "@better-auth/cli": "1.4.21"
  "@better-auth/utils": "0.4.0"
  "@better-auth/telemetry": "1.6.20"
  next: "16.2.11"
  fast-uri: "^3.1.4"
  esbuild: "^0.28.1"
  axios: "1.15.0"
  handlebars: "4.7.9"
  fastify: "5.8.5"
  defu: "6.1.5"
  lodash: "4.18.1"
  flatted: "3.4.2"
  picomatch: "4.0.4"
  brace-expansion: "5.0.6"
  vite: "7.3.2"
  jsdom: "25.0.1"
  kysely: "0.28.17"
  postcss: "8.5.14"
  protocol-buffers-schema: "3.6.1"
  uuid@<11.1.1: ^11.1.1
  source-map: "^0.7.4"

peerDependencyRules:
  allowedVersions:
    react: "^19.0.0"
    react-dom: "^19.0.0"

minimumReleaseAgeExclude:
  - brace-expansion@5.0.6
  - uuid@11.1.1

patchedDependencies:
  brace-expansion@5.0.6: patches/brace-expansion@5.0.6.patch
