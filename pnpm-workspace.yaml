packages:
  - 'apps/frontend'
  - 'apps/services/*'
  - 'packages/*'

allowBuilds:
  '@parcel/watcher': false
  core-js-pure: false
  esbuild: false
  puppeteer: false
  sharp: false
  unrs-resolver: false
  vue-demi: false

overrides:
  react: "^19.2.0"
  react-dom: "^19.2.0"
  better-auth: "1.6.2"
  "@better-auth/core": "1.6.2"
  "@better-auth/cli": "1.4.21"
  "@better-auth/utils": "0.4.0"
  "@better-auth/telemetry": "1.6.2"
  next: "16.2.6"
  axios: "1.15.0"
  handlebars: "4.7.9"
  fastify: "5.8.5"
  defu: "6.1.5"
  drizzle-orm: "0.45.2"
  lodash: "4.18.0"
  flatted: "3.4.2"
  picomatch: "4.0.4"
  brace-expansion: "5.0.6"
  vite: "7.3.2"
  jsdom: "25.0.1"
  kysely: "0.28.17"
  postcss: "8.5.14"
  protocol-buffers-schema: "3.6.1"
  uuid@<11.1.1: ^11.1.1

peerDependencyRules:
  allowedVersions:
    react: "^19.0.0"
    react-dom: "^19.0.0"

patchedDependencies:
  brace-expansion@5.0.6: patches/brace-expansion@5.0.6.patch

minimumReleaseAgeExclude:
  - brace-expansion@5.0.6
  - uuid@11.1.1
